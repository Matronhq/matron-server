services:
    caddy:
    # This compose file uses caddy-docker-proxy as the reverse proxy for matron-server!
    # For more info, visit https://github.com/lucaslorentz/caddy-docker-proxy
        image: lucaslorentz/caddy-docker-proxy:ci-alpine
        ports:
            - 80:80
            - 443:443
        environment:
            - CADDY_INGRESS_NETWORKS=caddy
        networks:
            - caddy
        volumes:
            - /var/run/docker.sock:/var/run/docker.sock
            - ./data:/data
        restart: unless-stopped
        labels:
            caddy: example.com
            caddy.0_respond: /.well-known/matrix/server {"m.server":"matrix.example.com:443"}
            caddy.1_respond: /.well-known/matrix/client {"m.server":{"base_url":"https://matrix.example.com"},"m.homeserver":{"base_url":"https://matrix.example.com"},"org.matrix.msc3575.proxy":{"url":"https://matrix.example.com"}}

    homeserver:
        ### If you already built the matron-server image with 'docker build' or want to use a registry image,
        ### then you are ready to go.
        image: matronhq/matron-server:latest
        restart: unless-stopped
        volumes:
            - db:/var/lib/matron-server
            #- ./matron-server.toml:/etc/matron-server.toml
        environment:
            MATRON_SERVER_SERVER_NAME: example.com # EDIT THIS
            MATRON_SERVER_DATABASE_PATH: /var/lib/matron-server
            MATRON_SERVER_PORT: 6167
            MATRON_SERVER_MAX_REQUEST_SIZE: 20000000 # in bytes, ~20 MB
            MATRON_SERVER_ALLOW_REGISTRATION: 'true'
            MATRON_SERVER_REGISTRATION_TOKEN: 'YOUR_TOKEN' # A registration token is required when registration is allowed.
            #MATRON_SERVER_YES_I_AM_VERY_VERY_SURE_I_WANT_AN_OPEN_REGISTRATION_SERVER_PRONE_TO_ABUSE: 'true'
            MATRON_SERVER_ALLOW_FEDERATION: 'true'
            MATRON_SERVER_TRUSTED_SERVERS: '["matrix.org"]'
            #MATRON_SERVER_LOG: warn,state_res=warn
            MATRON_SERVER_ADDRESS: 0.0.0.0
            #MATRON_SERVER_CONFIG: '/etc/matron-server.toml' # Uncomment if you mapped config toml above
        networks:
            - caddy
        labels:
            caddy: matrix.example.com
            caddy.reverse_proxy: "{{upstreams 6167}}"

volumes:
    db:

networks:
    caddy:
        external: true

[book]
authors = [
	"Matron Contributors"
]
description = "Matron Server, a high performance successor to Conduit and Conduwuit"
language = "en"
src = "docs"
title = "Matron Server"
text-direction = "ltr"

[build]
build-dir = "public"
create-missing = true
extra-watch-dirs = [
	"debian",
	"docker",
	"docs",
	"rpm",
]

[rust]
edition = "2024"

[output.html]
git-repository-url = "https://github.com/matronhq/matron-server"
edit-url-template = "https://github.com/matronhq/matron-server/edit/main/{path}"
git-repository-icon = "fab-github"

[output.html.search]
limit-results = 15

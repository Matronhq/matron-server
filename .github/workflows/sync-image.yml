name: Sync Image

on:
  workflow_dispatch:
    inputs:
      source_tag:
        description: "Tag to mirror from ghcr.io/matrix-construct/tuwunel"
        required: true
        default: "latest"
      target_tag:
        description: "Tag to publish to ghcr.io/matronhq/matron-server"
        required: true
        default: "latest"
  push:
    branches:
      - main
  schedule:
    - cron: "17 4 * * 1"

permissions:
  contents: read
  packages: write

jobs:
  sync:
    name: Mirror upstream Tuwunel image
    runs-on: ubuntu-latest
    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Mirror image
        env:
          SOURCE_TAG: ${{ inputs.source_tag || 'latest' }}
          TARGET_TAG: ${{ inputs.target_tag || 'latest' }}
          TARGET_OWNER: ${{ github.repository_owner }}
        run: |
          set -euo pipefail
          target_owner="$(printf '%s' "${TARGET_OWNER}" | tr '[:upper:]' '[:lower:]')"
          target_image="ghcr.io/${target_owner}/matron-server"
          docker buildx imagetools create \
            --tag "${target_image}:${TARGET_TAG}" \
            "ghcr.io/matrix-construct/tuwunel:${SOURCE_TAG}"

      - name: Make GHCR package public
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          gh api \
            -X PATCH \
            "/orgs/${GITHUB_REPOSITORY_OWNER}/packages/container/matron-server/visibility" \
            -f visibility=public \
            || echo "::warning::Could not change package visibility automatically; configure the GHCR package as public in GitHub package settings."

name: Sync Image

on:
  workflow_dispatch:
    inputs:
      source_tag:
        description: "Tag to mirror from ghcr.io/matrix-construct/tuwunel"
        required: true
        default: "latest"
      target_tag:
        description: "Tag to publish to ghcr.io/matronhq/matron-server"
        required: true
        default: "latest"
  push:
    branches:
      - main
  schedule:
    - cron: "17 4 * * 1"

permissions:
  contents: read
  packages: write

jobs:
  sync:
    name: Mirror upstream Tuwunel image
    runs-on: ubuntu-latest
    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Mirror image
        env:
          SOURCE_TAG: ${{ inputs.source_tag || 'latest' }}
          TARGET_TAG: ${{ inputs.target_tag || 'latest' }}
          TARGET_IMAGE: ghcr.io/${{ github.repository_owner }}/matron-server
        run: |
          set -euo pipefail
          docker buildx imagetools create \
            --tag "${TARGET_IMAGE}:${TARGET_TAG}" \
            "ghcr.io/matrix-construct/tuwunel:${SOURCE_TAG}"
